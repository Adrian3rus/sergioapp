<!DOCTYPE html>
<html>
<head>
    <title>Sistema Inventario</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }
        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
        }
        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            display: block;
            padding: 10px;
        }
        .sidebar a:hover {
            background: #343a40;
            color: white;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-2 sidebar p-3">
            <h4>📦 Sistema</h4>
            <hr>

            <a href="/"><i class="bi bi-box"></i> Inventario</a>
            <a href="/agregar"><i class="bi bi-plus-circle"></i> Agregar</a>
            <a href="/subir"><i class="bi bi-upload"></i> Subir Excel</a>
            <a href="/scanner"><i class="bi bi-qr-code-scan"></i> Escanear QR</a>
            <hr>
            <a href="/logout"><i class="bi bi-box-arrow-right"></i> Salir</a>
        </div>

        <!-- CONTENIDO -->
        <div class="col-10 p-4 bg-light">

            <!-- NAVBAR -->
            <div class="d-flex justify-content-between mb-4">
                <h3>Panel de Control</h3>
                <span class="text-muted">Admin</span>
            </div>

            {% block content %}{% endblock %}

        </div>

    </div>
</div>

</body>
</html>
