<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
.sidebar { background:#212529; min-height:100vh; }
.sidebar a { color:#adb5bd; display:block; padding:10px; text-decoration:none; }
.sidebar a:hover { background:#343a40; color:white; }

@media(max-width:768px){
.sidebar{ position:fixed; left:-100%; width:70%; transition:.3s;}
.sidebar.active{ left:0;}
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark d-md-none">
<button class="btn btn-light" onclick="toggleSidebar()">☰</button>
</nav>

<div class="container-fluid">
<div class="row">

<div id="sidebar" class="col-md-2 sidebar p-3">
<h5 class="text-white">Sistema</h5>
<a href="/">Inventario</a>
<a href="/agregar">Agregar</a>
<a href="/scanner">Escanear</a>
<a href="/subir">Subir Excel</a>
<a href="/logout">Salir</a>
</div>

<div class="col-md-10 p-3 bg-light">
{% block content %}{% endblock %}
</div>

</div>
</div>

<script>
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
