<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    overflow-x: hidden;
}

/* SIDEBAR */
.sidebar {
    background: #212529;
    min-height: 100vh;
}

.sidebar a {
    color: #adb5bd;
    display: block;
    padding: 12px;
    text-decoration: none;
}

.sidebar a:hover {
    background: #343a40;
    color: white;
}

/* MOBILE FIX REAL */
@media (max-width: 768px) {

    .sidebar {
        position: fixed;
        top: 0;
        left: -100%;
        width: 75%;
        height: 100%;
        z-index: 1050;
        transition: 0.3s;
    }

    .sidebar.active {
        left: 0;
    }

    /* OVERLAY */
    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 1040;
        display: none;
    }

    .overlay.active {
        display: block;
    }
}
</style>
</head>

<body>

<!-- NAVBAR MOBILE -->
<nav class="navbar navbar-dark bg-dark d-md-none">
<div class="container-fluid">
<button class="btn btn-outline-light" onclick="toggleSidebar()">☰</button>
<span class="navbar-brand">Inventario</span>
</div>
</nav>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div id="sidebar" class="col-md-2 sidebar p-3">
<h5 class="text-white">📦 Sistema</h5>

<a href="/"><i class="bi bi-box me-2"></i> Inventario</a>
<a href="/agregar"><i class="bi bi-plus-circle me-2"></i> Agregar</a>
<a href="/scanner"><i class="bi bi-qr-code-scan me-2"></i> Escanear</a>
<a href="/subir"><i class="bi bi-upload me-2"></i> Subir Excel</a>

<hr class="text-secondary">

<a href="/logout"><i class="bi bi-box-arrow-right me-2"></i> Salir</a>
</div>

<!-- CONTENIDO -->
<div class="col-md-10 p-3 bg-light">
{% block content %}{% endblock %}
</div>

</div>
</div>

<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}
</script>

</body>
</html>
