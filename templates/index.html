{% extends "base.html" %}

{% block content %}

<div class="card shadow mb-3">
    <div class="card-body">

        <form method="POST" class="mb-3">
            <div class="input-group">
                <input name="query" class="form-control" placeholder="Buscar producto...">
                <button class="btn btn-primary">Buscar</button>
            </div>
        </form>

        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                    <th>QR</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
            {% for p in data %}
                <tr>
                    <td>{{p.ID}}</td>
                    <td>{{p.Producto}}</td>
                    <td>{{p.Cantidad}}</td>
                    <td>${{p.Precio}}</td>
                    <td><img src="{{p.QR}}" width="50"></td>
                    <td>
                        <a href="/editar/{{p.ID}}" class="btn btn-sm btn-warning">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a href="/eliminar/{{p.ID}}" class="btn btn-sm btn-danger">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>

    </div>
</div>

{% endblock %}
