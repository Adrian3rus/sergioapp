{% extends "base.html" %}
{% block content %}

<div class="card shadow">
<div class="card-body">

<form method="POST">
<input name="producto" value="{{producto.Producto}}" class="form-control mb-2">
<input name="cantidad" value="{{producto.Cantidad}}" class="form-control mb-2">
<input name="precio" value="{{producto.Precio}}" class="form-control mb-2">

<button class="btn btn-primary">Actualizar</button>
</form>

</div>
</div>

{% endblock %}
